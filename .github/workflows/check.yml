name: Kino Check Stündlich

on:
  workflow_dispatch: # Erlaubt manuelles Starten
  schedule:
    - cron: '0 * * * *' # Läuft jede Stunde (Minute 0)

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wichtig, damit der Bot Dateien speichern darf
      
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Software installieren
        run: pip install requests

      - name: Skript ausführen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_tickets.py

      - name: Gedächtnis speichern
        # Speichert die Datei anzahl.txt wieder im Repository
        run: |
          git config --global user.name "Kino-Bot"
          git config --global user.email "bot@example.com"
          git add anzahl.txt || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Zustand aktualisiert" && git push)
