name: Kino Check Stündlich

on:
  workflow_dispatch: # Erlaubt manuelles Starten per Knopf
  schedule:
    - cron: '0 * * * *' # Das ist der "Conjob": Läuft jede Stunde (Minute 0)

jobs:
  check:
    runs-on: ubuntu-latest
    # WICHTIG: Damit der Bot die Textdatei im Repo speichern darf
    permissions:
      contents: write 
      
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Tunnel-Werkzeug installieren
        run: pip install requests

      - name: Skript ausführen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python check_tickets.py

      - name: Gedächtnis aktualisieren
        # Dieser Teil speichert die "aktuelle_shows.txt" wieder bei GitHub
        run: |
          git config --global user.name "Kino-Bot"
          git config --global user.email "bot@example.com"
          git add aktuelle_shows.txt || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Zustand aktualisiert" && git push)
