name: IMAX Check 30min

on:
  workflow_dispatch:
  schedule:
    - cron: '0,30 * * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Software installieren
        run: pip install requests beautifulsoup4 lxml

      - name: Skript ausführen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_tickets.py

      - name: Gedächtnis speichern
        run: |
          git config --global user.name "Kino-Bot"
          git config --global user.email "bot@example.com"
          git add aktuelle_shows.txt || true
          
          # Wir prüfen jetzt ganz sauber, ob es Änderungen gibt
          if [ -n "$(git status --porcelain)" ]; then
            echo "Änderungen gefunden, speichere..."
            git commit -m "Zustand aktualisiert"
            git push
          else
            echo "Keine Änderungen zum Speichern."
          fi
