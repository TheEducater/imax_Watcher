name: Kino Check
on:
  schedule:
    - cron: '*/15 6-11 * * 1' # Montags alle 15 Min zwischen 8 und 13 Uhr (deutsche Zeit)
  workflow_dispatch: # Erlaubt uns, den Bot manuell zum Testen zu starten

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Code laden
        uses: actions/checkout@v4
      - name: Python starten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Software installieren
        run: pip install requests
      - name: Skript ausführen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_tickets.py
