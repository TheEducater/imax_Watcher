name: IMAX Check Stündlich

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Software installieren
        run: pip install requests beautifulsoup4 lxml # <-- Wichtig: BeautifulSoup hinzufügen

      - name: Skript ausführen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_tickets.py

      - name: Gedächtnis speichern
        run: |
          git config --global user.name "Kino-Bot"
          git config --global user.email "bot@example.com"
          git add aktuelle_shows.txt || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Zustand aktualisiert" && git push)
