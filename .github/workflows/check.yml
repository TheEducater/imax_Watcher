name: Kino Check
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 6-11 * * 1'

jobs:
  check:
    runs-on: ubuntu-latest
    # GANZ WICHTIG: Erlaubt dem Bot, die Textdatei zu speichern
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Software installieren
        # Hier installieren wir den Türsteher-Trick (cloudscraper)
        run: pip install requests cloudscraper
      - name: Skript ausführen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_tickets.py
      - name: Zustand speichern
        # Hier speichert der Bot sein Notizbuch
        run: |
          git config --global user.name "Kino-Bot"
          git config --global user.email "bot@example.com"
          git add alte_filme.txt || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Ticket-Status" && git push)
          
